<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2 WIN Casino</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap');
        
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #f8f4eb, #f0e6d2);
            color: #2c1e0f;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            overflow-y: auto;
        }
        
        .header {
            background: linear-gradient(to right, #1a1a1a, #3a2a1f);
            color: #ffd700;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.25);
        }
        
        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 2.4em;
            font-weight: 700;
            letter-spacing: 2px;
        }
        
        .subtitle {
            font-size: 0.95em;
            color: #e0c080;
            margin-top: 4px;
        }

        .balance {
            background: rgba(255,255,255,0.95);
            color: #1a1a1a;
            padding: 10px 20px;
            border-radius: 50px;
            font-weight: 600;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            border: 2px solid #ffd700;
        }

        .top-buttons {
            display: flex;
            gap: 12px;
        }

        .top-btn {
            padding: 10px 20px;
            font-size: 1em;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .deposit-btn {
            background: linear-gradient(#4ade80, #22c55e);
            color: white;
            border: none;
        }

        .withdraw-btn {
            background: linear-gradient(#f87171, #ef4444);
            color: white;
            border: none;
        }

        .container {
            max-width: 820px;
            margin: 30px auto;
            padding: 0 15px;
        }

        .register-form {
            background: white;
            border: 3px solid #ffd700;
            border-radius: 20px;
            padding: 40px 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
            max-width: 460px;
            margin: 0 auto;
        }

        input {
            width: 100%;
            padding: 15px;
            margin: 12px 0;
            border: 2px solid #e0c080;
            border-radius: 12px;
            font-size: 1.05em;
            font-family: 'Inter', sans-serif;
            box-sizing: border-box;
        }

        .game-container {
            background: white;
            border: 4px solid #ffd700;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
        }
        
        .slots {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 30px 0;
            padding: 25px;
            background: linear-gradient(#1a1a1a, #2c2c2c);
            border: 6px solid #ffd700;
            border-radius: 16px;
        }
        
        .reel {
            width: 110px;
            height: 140px;
            background: #111;
            border: 5px solid #ffd700;
            font-size: 3.8em;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            box-shadow: 0 0 25px rgba(255, 215, 0, 0.7);
        }
        
        button {
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            padding: 16px 35px;
            font-size: 1.1em;
            margin: 8px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        button:hover {
            transform: translateY(-3px);
        }

        .win {
            font-size: 2em;
            margin: 25px 0;
            min-height: 70px;
            font-weight: 700;
            text-align: center;
            color: #16a34a;
        }

        /* Модальные окна */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.75);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-content {
            background: white;
            padding: 35px;
            border-radius: 20px;
            width: 90%;
            max-width: 420px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
        }

        .payment-option {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px;
            margin: 10px 0;
            border: 2px solid #e5e5e5;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .payment-option:hover {
            border-color: #ffd700;
            background: #fff9e6;
        }

        .logo-placeholder {
            width: 50px;
            height: 50px;
            background: #f1f1f1;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4em;
        }
    </style>
</head>
<body>
    <div class="header">
        <div>
            <div class="logo">2 WIN</div>
            <div class="subtitle">КАЗИНО • СЛОТЫ • ПОБЕДЫ</div>
        </div>
        
        <div id="user-info" style="display:none; text-align:right;">
            <div class="balance">👤 <span id="username"></span><br>💰 <span id="balance">10000</span> ₽</div>
        </div>

        <div class="top-buttons" id="top-buttons" style="display:none;">
            <button class="top-btn deposit-btn" onclick="showDeposit()">ПОПОЛНИТЬ</button>
            <button class="top-btn withdraw-btn" onclick="showWithdraw()">ВЫВЕСТИ</button>
        </div>
    </div>

    <div class="container">
        <!-- Регистрация -->
        <div id="register-screen">
            <div class="register-form">
                <h2 style="text-align:center; font-family:'Playfair Display', serif; font-size:2em;">Регистрация в 2 WIN</h2>
                <input type="text" id="reg-username" placeholder="Имя пользователя">
                <input type="email" id="reg-email" placeholder="Электронная почта">
                <input type="password" id="reg-password" placeholder="Придумайте пароль">
                <button onclick="register()" style="width:100%; padding:18px; font-size:1.25em; background:linear-gradient(#ffd700, #e6b800); color:#2c1e0f;">
                    ЗАРЕГИСТРИРОВАТЬСЯ + 10 000 ₽
                </button>
            </div>
        </div>

        <!-- Игра -->
        <div id="game-screen" style="display:none;">
            <div class="game-container">
                <h2 style="text-align:center; font-family:'Playfair Display', serif;">🎰 СЛОТЫ — КАЖДЫЙ СПИН = ВЫИГРЫШ 🎰</h2>
                
                <div class="slots" id="slots">
                    <div class="reel" id="reel1">🍒</div>
                    <div class="reel" id="reel2">⭐</div>
                    <div class="reel" id="reel3">💎</div>
                </div>

                <div style="text-align:center; margin:25px 0; font-size:1.35em;">
                    Ставка: 
                    <button onclick="changeBet(-200)" style="padding:8px 16px;">-200</button>
                    <span id="betAmount" style="font-size:1.7em; font-weight:700; margin:0 18px;">800</span> ₽
                    <button onclick="changeBet(200)" style="padding:8px 16px;">+200</button>
                </div>

                <div style="text-align:center;">
                    <button onclick="spin()" style="font-size:1.5em; padding:18px 70px; background:linear-gradient(#ffd700, #e6b800); color:#2c1e0f;">
                        КРУТИТЬ
                    </button>
                </div>

                <div class="win" id="result"></div>
            </div>
        </div>
    </div>

    <!-- Модальное окно Пополнения -->
    <div id="deposit-modal" class="modal">
        <div class="modal-content">
            <h2>Пополнение баланса</h2>
            <input type="number" id="deposit-amount" placeholder="Сумма" value="1000">
            <button onclick="makeDeposit()" style="width:100%; padding:16px; margin-top:15px; background:#22c55e;">ПОПОЛНИТЬ</button>
            <button onclick="closeModals()" style="width:100%; padding:16px; background:#999; margin-top:8px;">Отмена</button>
        </div>
    </div>

    <!-- Модальное окно Вывода -->
    <div id="withdraw-modal" class="modal">
        <div class="modal-content">
            <h2>Вывод средств</h2>
            <p><strong>Баланс:</strong> <span id="withdraw-balance">10000</span> ₽</p>
            
            <input type="number" id="withdraw-amount" placeholder="Сумма вывода" value="5000">
            
            <div style="margin:20px 0;">
                <p><strong>Выберите способ вывода:</strong></p>
                
                <div class="payment-option" onclick="selectPayment(this)">
                    <div class="logo-placeholder">💰</div>
                    <div>
                        <strong>СПБ</strong><br>
                        <small>Быстрый перевод</small>
                    </div>
                </div>

                <div class="payment-option" onclick="selectPayment(this)">
                    <div class="logo-placeholder">💳</div>
                    <div>
                        <strong>Сбербанк</strong><br>
                        <small>На карту Сбер</small>
                    </div>
                </div>

                <div class="payment-option" onclick="selectPayment(this)">
                    <div class="logo-placeholder">💳</div>
                    <div>
                        <strong>Тинькофф</strong><br>
                        <small>На карту Тинькофф</small>
                    </div>
                </div>
            </div>

            <button onclick="makeWithdraw()" style="width:100%; padding:16px; background:#ef4444; color:white;">ВЫВЕСТИ СРЕДСТВА</button>
            <button onclick="closeModals()" style="width:100%; padding:16px; background:#999; margin-top:8px;">Отмена</button>
        </div>
    </div>

    <script>
        let balance = 10000;
        let bet = 800;
        let currentUser = "";

        const symbols = ['🍒', '🍋', '🍉', '⭐', '💎', '🔔', '7️⃣', '🍓', '🍊', '👑'];

        function updateBalance() {
            document.getElementById('balance').textContent = balance.toLocaleString('ru-RU');
            document.getElementById('withdraw-balance').textContent = balance.toLocaleString('ru-RU');
        }

        function register() {
            const username = document.getElementById('reg-username').value.trim();
            const email = document.getElementById('reg-email').value.trim();
            const password = document.getElementById('reg-password').value.trim();

            if (!username || !email || !password) {
                alert("Пожалуйста, заполните все поля!");
                return;
            }

            currentUser = username;
            alert(`✅ Регистрация прошла успешно!\nДобро пожаловать, ${username}!\nВам начислено 10 000 ₽`);

            document.getElementById('register-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'block';
            document.getElementById('user-info').style.display = 'block';
            document.getElementById('top-buttons').style.display = 'flex';
            document.getElementById('username').textContent = currentUser;
            updateBalance();
        }

        function changeBet(amount) {
            bet = Math.max(200, Math.min(15000, bet + amount));
            document.getElementById('betAmount').textContent = bet;
        }

        function getRandomSymbol() {
            return symbols[Math.floor(Math.random() * symbols.length)];
        }

        function spin() {
            if (balance < bet) {
                document.getElementById('result').innerHTML = '❌ Недостаточно средств!';
                return;
            }
            balance -= bet;
            updateBalance();

            document.getElementById('result').innerHTML = '<span style="color:#ca8a04;">КРУТИМ...</span>';

            let spins = 0;
            const interval = setInterval(() => {
                document.getElementById('reel1').textContent = getRandomSymbol();
                document.getElementById('reel2').textContent = getRandomSymbol();
                document.getElementById('reel3').textContent = getRandomSymbol();
                spins++;
                if (spins > 16) {
                    clearInterval(interval);
                    finishSpin();
                }
            }, 85);
        }

        function finishSpin() {
            const s1 = getRandomSymbol();
            const s2 = getRandomSymbol();
            const s3 = getRandomSymbol();
            
            document.getElementById('reel1').textContent = s1;
            document.getElementById('reel2').textContent = s2;
            document.getElementById('reel3').textContent = s3;
            
            let multiplier = 3;
            if (s1 === s2 && s2 === s3) multiplier = (s1 === '💎' || s1 === '👑') ? 20 : 12;
            else if (s1 === s2 || s2 === s3 || s1 === s3) multiplier = 5;
            
            const winAmount = Math.floor(bet * multiplier);
            balance += winAmount;
            
            document.getElementById('result').innerHTML = `🎉 +${winAmount.toLocaleString('ru-RU')} ₽ <span style="color:#16a34a;">(x${multiplier})</span>`;
            updateBalance();
        }

        function showDeposit() {
            document.getElementById('deposit-modal').style.display = 'flex';
        }

        function makeDeposit() {
            const amount = parseInt(document.getElementById('deposit-amount').value) || 0;
            if (amount > 0) {
                balance += amount;
                updateBalance();
                document.getElementById('result').innerHTML = `✅ Пополнено +${amount.toLocaleString('ru-RU')} ₽`;
                closeModals();
            }
        }

        function showWithdraw() {
            document.getElementById('withdraw-modal').style.display = 'flex';
        }

        function selectPayment(el) {
            document.querySelectorAll('.payment-option').forEach(e => e.style.borderColor = '#e5e5e5');
            el.style.borderColor = '#ffd700';
        }

        function makeWithdraw() {
            const amount = parseInt(document.getElementById('withdraw-amount').value) || 0;
            if (amount > balance) return alert("Недостаточно средств!");
            if (amount <= 0) return alert("Введите сумму!");
            
            balance -= amount;
            updateBalance();
            document.getElementById('result').innerHTML = `💸 Заявка на вывод ${amount.toLocaleString('ru-RU')} ₽ принята`;
            closeModals();
        }

        function closeModals() {
            document.getElementById('deposit-modal').style.display = 'none';
            document.getElementById('withdraw-modal').style.display = 'none';
        }
    </script>
</body>
</html>
