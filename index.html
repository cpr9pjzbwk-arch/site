<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2 WIN Casino</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            margin: 0; padding: 0;
            background: #f8f1e3;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            touch-action: manipulation; /* –Ю—В–Ї–ї—О—З–∞–µ—В –і–≤–Њ–є–љ–Њ–є —В–∞–њ zoom */
        }

        .header {
            background: #1a1a1a;
            color: white;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        .logo { font-size: 2.3em; font-weight: 900; color: #ffd700; }

        .balance-pill {
            background: white;
            color: #1a1a1a;
            border-radius: 50px;
            padding: 10px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 600;
        }

        .btn {
            padding: 13px 26px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 1.05em;
            border: none;
            cursor: pointer;
        }
        .green { background: #22c55e; color: white; }
        .red { background: #ef4444; color: white; }

        .game-area {
            flex: 1;
            padding: 20px 15px;
            display: flex;
            justify-content: center;
        }

        .game-card {
            background: white;
            border-radius: 28px;
            padding: 25px;
            border: 6px solid #ffd700;
            box-shadow: 0 15px 50px rgba(0,0,0,0.15);
            width: 100%;
            max-width: 820px;
        }

        .slots {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            background: #0a0a0a;
            padding: 25px 20px;
            border-radius: 22px;
            margin: 25px 0;
            box-shadow: 0 0 40px rgba(255, 215, 0, 0.7);
        }

        .reel {
            width: 100%;
            height: 95px;
            background: #111;
            border: 5px solid #ffd700;
            border-radius: 12px;
            font-size: 2.6em;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 20px rgba(255,215,0,0.8);
        }

        .bet-section {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin: 25px 0;
            font-size: 1.5em;
        }

        .bet-btn {
            background: #f1f1f1;
            padding: 12px 22px;
            border-radius: 12px;
            font-weight: 600;
            border: none;
            cursor: pointer;
        }

        .spin-button {
            width: 100%;
            background: linear-gradient(90deg, #ffd700, #facc15);
            color: #1f1f1f;
            font-size: 1.65em;
            font-weight: 800;
            padding: 20px;
            border: none;
            border-radius: 18px;
        }

        .win {
            text-align: center;
            font-size: 1.9em;
            margin: 20px 0;
            font-weight: 700;
            color: #16a34a;
        }
    </style>
</head>
<body>
    <!-- (–Т–µ—Б—М –Њ—Б—В–∞–ї—М–љ–Њ–є –Ї–Њ–і –Њ—Б—В–∞—С—В—Б—П —В–∞–Ї–Є–Љ –ґ–µ, –Ї–∞–Ї –≤ –њ—А–µ–і—Л–і—Г—Й–µ–є –≤–µ—А—Б–Є–Є) -->

    <div class="header">
        <div class="logo">2 WIN</div>
        <div id="user-info" style="display:none;">
            <div class="balance-pill">
                рЯС§ <span id="username"></span> вАФ <span id="balance">10000</span> вВљ
            </div>
        </div>
        <div id="action-buttons" style="display:none;">
            <button class="btn green" onclick="showDeposit()">–Я–Ю–Я–Ю–Ы–Э–Ш–Ґ–ђ</button>
            <button class="btn red" onclick="showWithdraw()">–Т–Ђ–Т–Х–°–Ґ–Ш</button>
        </div>
    </div>

    <!-- –†–µ–≥–Є—Б—В—А–∞—Ж–Є—П -->
    <div id="register-screen" class="game-area">
        <div class="game-card">
            <h2 style="text-align:center;">–†–µ–≥–Є—Б—В—А–∞—Ж–Є—П –≤ 2 WIN</h2>
            <input type="text" id="reg-username" placeholder="–Ш–Љ—П –њ–Њ–ї—М–Ј–Њ–≤–∞—В–µ–ї—П" style="width:100%; padding:15px; margin:10px 0; border:2px solid #ffd700; border-radius:12px;">
            <input type="email" id="reg-email" placeholder="–≠–ї–µ–Ї—В—А–Њ–љ–љ–∞—П –њ–Њ—З—В–∞" style="width:100%; padding:15px; margin:10px 0; border:2px solid #ffd700; border-radius:12px;">
            <input type="password" id="reg-password" placeholder="–Я—А–Є–і—Г–Љ–∞–є—В–µ –њ–∞—А–Њ–ї—М" style="width:100%; padding:15px; margin:10px 0; border:2px solid #ffd700; border-radius:12px;">
            <button onclick="register()" style="width:100%; padding:18px; margin-top:15px; background:linear-gradient(#ffd700,#facc15); font-size:1.2em; font-weight:700; border:none; border-radius:16px;">
                –Ч–Р–†–Х–У–Ш–°–Ґ–†–Ш–†–Ю–Т–Р–Ґ–ђ–°–ѓ + 10 000 вВљ
            </button>
        </div>
    </div>

    <!-- –Ш–≥—А–∞ -->
    <div id="game-screen" class="game-area" style="display:none;">
        <div class="game-card">
            <div style="text-align:center; font-size:1.35em; font-weight:700; margin-bottom:20px;">
                рЯО≤ 12 –Ъ–£–С–Ш–Ъ–Ю–Т вАФ 4 –Ю–Ф–Ш–Э–Р–Ъ–Ю–Т–Ђ–• = –Т–Ђ–Ш–У–†–Ђ–® рЯО≤
            </div>

            <div class="slots" id="slots"></div>

            <div class="bet-section">
                <button class="bet-btn" onclick="changeBet(-200)">-200</button>
                <div style="text-align:center;"><span id="betAmount" style="font-size:2.3em; font-weight:800;">800</span> вВљ</div>
                <button class="bet-btn" onclick="changeBet(200)">+200</button>
            </div>

            <button class="spin-button" onclick="spin()">–Ъ–†–£–Ґ–Ш–Ґ–ђ</button>
            <div class="win" id="result"></div>
        </div>
    </div>

    <script>
        // (–Т–µ—Б—М JavaScript –Њ—Б—В–∞—С—В—Б—П —В–∞–Ї–Є–Љ –ґ–µ, –Ї–∞–Ї –≤ –њ—А–µ–і—Л–і—Г—Й–µ–є –≤–µ—А—Б–Є–Є)
        let balance = 10000;
        let bet = 800;
        let currentUser = "";

        const symbols = ['рЯНТ','рЯНЛ','рЯНЙ','в≠Р','рЯТО','рЯФФ','7пЄПвГ£','рЯНУ','рЯСС','рЯНК','рЯНЗ','рЯФ•'];

        function updateBalance() {
            document.getElementById('balance').textContent = balance.toLocaleString('ru-RU');
        }

        function register() {
            const username = document.getElementById('reg-username').value.trim();
            if (!username) return alert("–Т–≤–µ–і–Є—В–µ –Є–Љ—П –њ–Њ–ї—М–Ј–Њ–≤–∞—В–µ–ї—П!");
            currentUser = username;

            alert(`вЬЕ –†–µ–≥–Є—Б—В—А–∞—Ж–Є—П —Г—Б–њ–µ—И–љ–∞!\n–Ф–Њ–±—А–Њ –њ–Њ–ґ–∞–ї–Њ–≤–∞—В—М, ${username}!\n+10 000 вВљ`);

            document.getElementById('register-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'flex';
            document.getElementById('user-info').style.display = 'block';
            document.getElementById('action-buttons').style.display = 'block';
            document.getElementById('username').textContent = username;
            updateBalance();
            createSlots();
        }

        function createSlots() {
            const container = document.getElementById('slots');
            container.innerHTML = '';
            for (let i = 1; i <= 12; i++) {
                const reel = document.createElement('div');
                reel.className = 'reel';
                reel.id = `reel${i}`;
                reel.textContent = symbols[Math.floor(Math.random() * symbols.length)];
                container.appendChild(reel);
            }
        }

        function changeBet(amount) {
            bet = Math.max(200, Math.min(50000, bet + amount));
            document.getElementById('betAmount').textContent = bet;
        }

        function getRandomSymbol() {
            return symbols[Math.floor(Math.random() * symbols.length)];
        }

        async function spin() {
            if (balance < bet) {
                document.getElementById('result').innerHTML = 'вЭМ –Э–µ–і–Њ—Б—В–∞—В–Њ—З–љ–Њ —Б—А–µ–і—Б—В–≤!';
                return;
            }

            balance -= bet;
            updateBalance();
            document.getElementById('result').innerHTML = '–Ъ–†–£–Ґ–Ш–Ь...';

            const reels = [];
            for (let i = 1; i <= 12; i++) {
                reels.push(document.getElementById(`reel${i}`));
            }

            await animateRow(reels.slice(0, 4), 14);
            await animateRow(reels.slice(4, 8), 14);
            await animateRow(reels.slice(8, 12), 14);

            finishSpin();
        }

        function animateRow(rowReels, iterations) {
            return new Promise(resolve => {
                let count = 0;
                const interval = setInterval(() => {
                    rowReels.forEach(reel => {
                        reel.textContent = getRandomSymbol();
                    });
                    count++;
                    if (count >= iterations) {
                        clearInterval(interval);
                        resolve();
                    }
                }, 55);
            });
        }

        function finishSpin() {
            const finalSymbols = [];
            for (let i = 1; i <= 12; i++) {
                const sym = getRandomSymbol();
                document.getElementById(`reel${i}`).textContent = sym;
                finalSymbols.push(sym);
            }

            const counts = {};
            finalSymbols.forEach(s => counts[s] = (counts[s] || 0) + 1);
            const maxCount = Math.max(...Object.values(counts));

            let winAmount = 0;
            let message = 'рЯШҐ –Э–µ –њ–Њ–≤–µ–Ј–ї–Њ';

            if (maxCount >= 6) winAmount = bet * 40, message = `рЯФ• –Ь–Х–У–Р –Т–Ђ–Ш–У–†–Ђ–®!`;
            else if (maxCount >= 5) winAmount = bet * 20, message = `рЯОЙ –Ю–Ґ–Ы–Ш–І–Э–Ђ–Щ –Т–Ђ–Ш–У–†–Ђ–®!`;
            else if (maxCount >= 4) winAmount = bet * 10, message = `рЯОК –І–Х–Ґ–Ђ–†–Х –Ю–Ф–Ш–Э–Р–Ъ–Ю–Т–Ђ–•!`;
            else if (Math.random() < 0.78) winAmount = Math.floor(bet * 2), message = `вЬЕ –Т—Л–Є–≥—А—Л—И`;

            if (winAmount > 0) {
                balance += winAmount;
                updateBalance();
                message += ` +${winAmount} вВљ`;
            }

            document.getElementById('result').innerHTML = message;
        }

        function showDeposit() { alert("–Я–Њ–њ–Њ–ї–љ–µ–љ–Є–µ —З–µ—А–µ–Ј –°–±–µ—А–±–∞–љ–Ї"); }
        function showWithdraw() { alert("–Т—Л–≤–Њ–і —Б—А–µ–і—Б—В–≤"); }
    </script>
</body>
</html>
