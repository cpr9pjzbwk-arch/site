<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Тройка Premium</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
}

body {
  background: radial-gradient(circle at top, #1a1a2e, #0f0f1a);
  color: white;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

.app {
  width: 360px;
  padding: 20px;
}

.header {
  text-align: center;
  margin-bottom: 20px;
}

.header h1 {
  font-size: 24px;
}

.header p {
  font-size: 13px;
  opacity: 0.6;
}

.plans {
  display: grid;
  gap: 12px;
}

.plan {
  padding: 15px;
  border-radius: 15px;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.08);
  cursor: pointer;
  transition: 0.3s;
}

.plan:hover {
  transform: translateY(-3px);
}

.plan.active {
  border: 1px solid #6c5ce7;
  box-shadow: 0 0 15px #6c5ce7;
}

.form {
  margin-top: 15px;
}

input {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 10px;
  border: none;
  outline: none;
  background: rgba(255,255,255,0.08);
  color: white;
}

.buttons {
  margin-top: 15px;
  display: grid;
  gap: 10px;
}

button {
  padding: 12px;
  border-radius: 12px;
  border: none;
  font-size: 15px;
  cursor: pointer;
  transition: 0.3s;
}

.whatsapp {
  background: linear-gradient(45deg, #25D366, #1ebe5d);
}

.telegram {
  background: linear-gradient(45deg, #0088cc, #00aaff);
}

button:hover {
  transform: scale(1.05);
}
</style>
</head>

<body>

<div class="app">

  <div class="header">
    <h1>🚇 Тройка Premium</h1>
    <p>Быстрый заказ с доставкой</p>
  </div>

  <div class="plans">
    <div class="plan active" onclick="selectPlan(this)">1 месяц — 1000₽</div>
    <div class="plan" onclick="selectPlan(this)">2 месяца — 1500₽</div>
    <div class="plan" onclick="selectPlan(this)">3 месяца — 2500₽</div>
    <div class="plan" onclick="selectPlan(this)">4 месяца — 3500₽</div>
    <div class="plan" onclick="selectPlan(this)">5 месяцев — 4000₽</div>
  </div>

  <div class="form">
    <input type="text" id="name" placeholder="👤 Имя">
    <input type="text" id="phone" placeholder="📞 Телефон">
    <input type="text" id="address" placeholder="📍 Адрес доставки">
  </div>

  <div class="buttons">
    <button class="whatsapp" onclick="orderWhatsApp()">📲 WhatsApp</button>
    <button class="telegram" onclick="orderTelegram()">✈️ Telegram</button>
  </div>

</div>

<script>
let selectedPlan = "1 месяц — 1000₽";

function selectPlan(el) {
  document.querySelectorAll('.plan').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  selectedPlan = el.innerText;
}

function getData() {
  const name = document.getElementById('name').value;
  const phone = document.getElementById('phone').value;
  const address = document.getElementById('address').value;

  return `🔥 Заказ Тройка Premium:
Тариф: ${selectedPlan}
Имя: ${name}
Телефон: ${phone}
Адрес: ${address}`;
}

function orderWhatsApp() {
  const msg = encodeURIComponent(getData());
  const phoneNumber = "79230304790";
  window.open(`https://wa.me/${phoneNumber}?text=${msg}`);
}

function orderTelegram() {
  const msg = encodeURIComponent(getData());
  const username = "muhammadrasul277";
  window.open(`https://t.me/${username}?text=${msg}`);
}
</script>

</body>
</html>
