<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💎 GROK CASINO 💎</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #0f001a, #1a0033);
            color: #00ffcc;
            font-family: 'Press Start 2P', cursive;
            text-align: center;
            overflow: hidden;
        }
        
        .header {
            background: rgba(0, 0, 0, 0.8);
            padding: 20px;
            border-bottom: 4px solid #ff00aa;
            text-shadow: 0 0 20px #ff00aa;
        }
        
        h1 {
            margin: 0;
            font-size: 2.5em;
            color: #ff00aa;
            text-shadow: 0 0 30px #ff00ff;
        }
        
        .balance {
            font-size: 1.5em;
            margin: 15px 0;
            color: #00ff00;
        }
        
        .game-container {
            max-width: 800px;
            margin: 30px auto;
            padding: 20px;
            background: rgba(0, 0, 0, 0.7);
            border: 6px solid #ff00aa;
            border-radius: 15px;
            box-shadow: 0 0 40px #ff00ff;
        }
        
        .slots {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 30px 0;
            padding: 20px;
            background: #000;
            border: 5px solid #00ffff;
        }
        
        .reel {
            width: 120px;
            height: 160px;
            background: #111;
            border: 4px solid #ffd700;
            font-size: 4em;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: inset 0 0 20px #000;
        }
        
        button {
            font-family: 'Press Start 2P', cursive;
            padding: 15px 40px;
            font-size: 1.2em;
            margin: 10px;
            background: #ff00aa;
            color: white;
            border: none;
            cursor: pointer;
            box-shadow: 0 0 20px #ff00ff;
            transition: all 0.2s;
        }
        
        button:hover {
            background: #ff66cc;
            transform: scale(1.1);
        }
        
        button:active {
            transform: scale(0.95);
        }
        
        .bet {
            display: inline-block;
            margin: 15px;
            font-size: 1.3em;
        }
        
        .win {
            color: #00ff00;
            font-size: 2em;
            min-height: 50px;
            text-shadow: 0 0 20px #00ff00;
        }
        
        .history {
            margin-top: 20px;
            font-size: 0.9em;
            color: #aaa;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>💎 GROK CASINO 💎</h1>
        <div class="balance">Баланс: <span id="balance">10000</span> ₽</div>
    </div>

    <div class="game-container">
        <h2>🎰 СЛОТ-МАШИНА 🎰</h2>
        
        <div class="slots" id="slots">
            <div class="reel" id="reel1">🍒</div>
            <div class="reel" id="reel2">🍒</div>
            <div class="reel" id="reel3">🍒</div>
        </div>

        <div class="bet">
            Ставка: 
            <button onclick="changeBet(-100)">-100</button>
            <span id="betAmount">500</span> ₽
            <button onclick="changeBet(100)">+100</button>
        </div>

        <button onclick="spin()">КРУТИТЬ ЗА 500₽</button>
        <button onclick="addMoney()">+5000 ₽ (чит)</button>

        <div class="win" id="result"></div>
        
        <div class="history" id="history"></div>
    </div>

    <script>
        let balance = 10000;
        let bet = 500;
        const symbols = ['🍒', '🍋', '🍉', '⭐', '💎', '🔔', '7️⃣'];
        
        function updateBalance() {
            document.getElementById('balance').textContent = balance;
        }
        
        function changeBet(amount) {
            bet = Math.max(100, Math.min(2000, bet + amount));
            document.getElementById('betAmount').textContent = bet;
        }
        
        function getRandomSymbol() {
            return symbols[Math.floor(Math.random() * symbols.length)];
        }
        
        function spin() {
            if (balance < bet) {
                document.getElementById('result').innerHTML = '❌ НЕДОСТАТОЧНО СРЕДСТВ!';
                return;
            }
            
            balance -= bet;
            updateBalance();
            
            const reel1 = document.getElementById('reel1');
            const reel2 = document.getElementById('reel2');
            const reel3 = document.getElementById('reel3');
            const resultEl = document.getElementById('result');
            
            resultEl.textContent = 'КРУТИМ...';
            
            // Анимация
            let spins = 0;
            const interval = setInterval(() => {
                reel1.textContent = getRandomSymbol();
                reel2.textContent = getRandomSymbol();
                reel3.textContent = getRandomSymbol();
                spins++;
                if (spins > 15) {
                    clearInterval(interval);
                    finishSpin();
                }
            }, 80);
        }
        
        function finishSpin() {
            const reel1 = document.getElementById('reel1');
            const reel2 = document.getElementById('reel2');
            const reel3 = document.getElementById('reel3');
            
            const s1 = getRandomSymbol();
            const s2 = getRandomSymbol();
            const s3 = getRandomSymbol();
            
            reel1.textContent = s1;
            reel2.textContent = s2;
            reel3.textContent = s3;
            
            let winAmount = 0;
            
            if (s1 === s2 && s2 === s3) {
                if (s1 === '💎') winAmount = bet * 50;
                else if (s1 === '7️⃣') winAmount = bet * 25;
                else winAmount = bet * 10;
            } 
            else if (s1 === s2 || s2 === s3 || s1 === s3) {
                winAmount = bet * 2;
            }
            
            if (winAmount > 0) {
                balance += winAmount;
                document.getElementById('result').innerHTML = `🎉 ВЫИГРЫШ +${winAmount} ₽!`;
                document.getElementById('result').style.color = '#00ff00';
            } else {
                document.getElementById('result').innerHTML = '😢 ПРОИГРЫШ';
                document.getElementById('result').style.color = '#ff0066';
            }
            
            updateBalance();
            addToHistory(s1, s2, s3, winAmount);
        }
        
        function addToHistory(s1, s2, s3, win) {
            const history = document.getElementById('history');
            const entry = document.createElement('div');
            entry.innerHTML = `${s1} ${s2} ${s3} — ${win > 0 ? '+' + win : '0'}₽`;
            history.prepend(entry);
            
            if (history.children.length > 8) {
                history.removeChild(history.lastChild);
            }
        }
        
        function addMoney() {
            balance += 5000;
            updateBalance();
            document.getElementById('result').innerHTML = '💰 +5000 ₽ добавлено!';
        }
        
        // Инициализация
        updateBalance();
    </script>
</body>
</html>
