<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Заказ карты Тройка</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
* { box-sizing: border-box; }
body {
    font-family: 'Segoe UI', Arial, sans-serif;
    min-height: 100vh;
    margin: 0;
    padding: 20px;
    background:
        linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)),
        url("https://upload.wikimedia.org/wikipedia/commons/3/3e/Troika_card_Moscow.jpg");
    background-size: cover;
    background-position: center;
}
.container {
    max-width: 420px;
    margin: auto;
    background: rgba(255,255,255,0.96);
    padding: 24px;
    border-radius: 18px;
    box-shadow: 0 15px 30px rgba(0,0,0,0.3);
}
h2 { text-align: center; margin-bottom: 24px; }
.field { margin-bottom: 14px; }
.field label {
    display: block;
    margin-bottom: 6px;
    font-size: 14px;
    color: #444;
}
.field input, .field select {
    width: 100%;
    padding: 14px 16px;
    border-radius: 10px;
    border: 1px solid #ddd;
    font-size: 16px;
}
.phone-group {
    display: flex;
    gap: 8px;
}
.phone-group select { width: 38%; }
.phone-group input { width: 62%; }

button {
    width: 100%;
    padding: 15px;
    border-radius: 12px;
    border: none;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    margin-top: 10px;
}
.wa {
    background: linear-gradient(135deg, #25D366, #1ebe5d);
    color: #fff;
}
.tg {
    background: linear-gradient(135deg, #0088cc, #007ab8);
    color: #fff;
}
</style>
</head>

<body>
<div class="container">
<h2>🎫 Заказ карты «Тройка»</h2>

<div class="field">
    <label>ФИО</label>
    <input type="text" id="name" placeholder="Введите ФИО">
</div>

<div class="field">
    <label>Телефон</label>
    <div class="phone-group">
        <select id="code">
            <option value="+7">🇷🇺 +7</option>
            <option value="+992">🇹🇯 +992</option>
            <option value="+998">🇺🇿 +998</option>
            <option value="+996">🇰🇬 +996</option>
            <option value="+994">🇦🇿 +994</option>
            <option value="+993">🇹🇲 +993</option>
            <option value="+375">🇧🇾 +375</option>
            <option value="+374">🇦🇲 +374</option>
            <option value="+380">🇺🇦 +380</option>
        </select>
        <input type="tel" id="phone" placeholder="Номер"
               maxlength="12"
               oninput="this.value=this.value.replace(/\D/g,'')">
    </div>
</div>

<div class="field">
    <label>Тип карты «Тройка»</label>
    <select id="plan">
        <option value="">Выберите вариант</option>
        <option value="Безлимит 1 месяц — 1000">Безлимит 1 месяц — 1000</option>
        <option value="3100">3100</option>
        <option value="4100">4100</option>
        <option value="6100">6100</option>
    </select>
</div>

<div class="field">
    <label>Ближайшее метро</label>
    <input type="text" id="metro" placeholder="Например: Комсомольская">
</div>

<div class="field">
    <label>Количество карт</label>
    <input type="text" id="quantity" placeholder="Только цифры"
           oninput="this.value=this.value.replace(/\D/g,'')">
</div>

<button class="wa" onclick="sendWhatsApp()">📲 WhatsApp</button>
<button class="tg" onclick="sendTelegram()">✈️ Telegram</button>
</div>

<script>
function getMessage() {
    const name = document.getElementById("name").value;
    const code = document.getElementById("code").value;
    const phone = document.getElementById("phone").value;
    const plan = document.getElementById("plan").value;
    const metro = document.getElementById("metro").value;
    const quantity = document.getElementById("quantity").value;

    if (!name || !phone || !plan || !metro || !quantity) {
        alert("Заполните все поля");
        return null;
    }

    return (
        "📌 Заказ карты Тройка\n\n" +
        "👤 ФИО: " + name + "\n" +
        "📞 Телефон: " + code + phone + "\n" +
        "🎫 Тип карты: " + plan + "\n" +
        "🚇 Метро: " + metro + "\n" +
        "📦 Количество: " + quantity
    );
}

function sendWhatsApp() {
    const msg = getMessage(); if (!msg) return;
    window.location.href = "https://wa.me/79230304790?text=" + encodeURIComponent(msg);
}

function sendTelegram() {
    const msg = getMessage(); if (!msg) return;
    window.location.href = "tg://resolve?domain=Muhammadrasul277&text=" + encodeURIComponent(msg);
}
</script>

</body>
</html>


</html>
