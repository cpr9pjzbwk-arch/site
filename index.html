<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Поступление 2026</title>

<style>
body {
    font-family: Arial;
    background: linear-gradient(135deg,#4f46e5,#9333ea,#06b6d4);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}

.container {
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(15px);
    padding:30px;
    border-radius:20px;
    color:white;
    width:350px;
    text-align:center;
}

input, select {
    width:100%;
    padding:10px;
    margin:10px 0;
    border-radius:10px;
    border:none;
}

button {
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    margin-top:10px;
    cursor:pointer;
    font-size:15px;
}

.btn-whatsapp {
    background:#25D366;
    color:white;
}

.btn-telegram {
    background:#0088cc;
    color:white;
}
</style>
</head>

<body>

<div class="container">
    <h2>🎓 Поступление 2026</h2>

    <form id="form">
        <input type="text" id="name" placeholder="Имя" required>
        <input type="tel" id="phone" placeholder="Телефон" required>
        <input type="email" id="email" placeholder="Email" required>

        <select id="city" required>
            <option value="">Выберите город</option>
            <option>Москва</option>
            <option>Новосибирск</option>
            <option>Ульяновск</option>
            <option>Екатеринбург</option>
        </select>
    </form>

    <!-- только кнопки -->
    <button class="btn-whatsapp" onclick="sendWhatsApp()">📱 Отправить в WhatsApp</button>
    <button class="btn-telegram" onclick="sendTelegram()">✈️ Отправить в Telegram</button>

</div>

<script>
function getMessage() {
    let name = document.getElementById('name').value;
    let phone = document.getElementById('phone').value;
    let email = document.getElementById('email').value;
    let city = document.getElementById('city').value;

    return `🎓 Новая заявка:
Имя: ${name}
Телефон: ${phone}
Email: ${email}
Город: ${city}`;
}

function sendWhatsApp() {
    let message = getMessage();
    window.open(`https://wa.me/79236244554?text=${encodeURIComponent(message)}`);
}

function sendTelegram() {
    let message = getMessage();
    window.open(`https://t.me/institutmoskow?text=${encodeURIComponent(message)}`);
}
</script>

</body>
</html>
