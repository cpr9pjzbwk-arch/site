<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lucky Wheel Casino</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #1a1c29 0%, #0e1017 100%);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
        }

        h2 {
            text-align: center;
            margin-bottom: 24px;
            color: #ffb703;
            font-size: 24px;
            letter-spacing: 1px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #aaa;
            font-size: 14px;
        }

        input[type="text"],
        input[type="email"],
        input[type="password"],
        input[type="number"] {
            width: 100%;
            padding: 12px 16px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            color: white;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: #ffb703;
            box-shadow: 0 0 8px rgba(255, 183, 3, 0.3);
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(90deg, #ffb703 0%, #fb8500 100%);
            border: none;
            border-radius: 12px;
            color: #023047;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.3s;
        }

        button:hover {
            opacity: 0.9;
        }

        button:active {
            transform: scale(0.98);
        }

        /* Игровой экран скрыт изначально */
        #game-screen {
            display: none;
        }

        .header-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.05);
            padding: 12px 16px;
            border-radius: 14px;
            margin-bottom: 25px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .user-info .name {
            font-weight: bold;
            color: #ffb703;
            font-size: 16px;
        }

        .balance-box {
            text-align: right;
        }

        .balance-box .amount {
            color: #8ecae6;
            font-weight: bold;
            font-size: 18px;
        }

        /* Пополнение */
        .deposit-section {
            background: rgba(142, 202, 230, 0.1);
            border: 1px dashed rgba(142, 202, 230, 0.3);
            border-radius: 14px;
            padding: 15px;
            margin-bottom: 25px;
        }

        .deposit-inputs {
            display: flex;
            gap: 10px;
            margin-top: 8px;
        }

        /* Колесо / Барабан из 12 кубиков */
        .wheel-container {
            position: relative;
            width: 280px;
            height: 280px;
            margin: 0 auto 25px auto;
        }

        .wheel {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 6px solid #fb8500;
            position: relative;
            overflow: hidden;
            transition: transform 4s cubic-bezier(0.15, 0.85, 0.35, 1);
            background: #023047;
            box-shadow: 0 0 20px rgba(251, 133, 0, 0.4);
        }

        /* Центральная точка */
        .wheel::before {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            background: #fff;
            border: 4px solid #ffb703;
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
        }

        /* Стрелка указателя сверху */
        .pointer {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 25px solid #ff0055;
            z-index: 20;
            filter: drop-shadow(0 2px 5px rgba(0,0,0,0.5));
        }

        /* Сектора (Кубики) внутри колеса */
        .sector {
            position: absolute;
            width: 50%;
            height: 50%;
            left: 50%;
            top: 50%;
            transform-origin: 0% 0%;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .sector-content {
            position: absolute;
            left: 30px;
            top: 30px;
            font-size: 22px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .sector-content .num {
            font-size: 11px;
            color: rgba(255,255,255,0.6);
            margin-top: 2px;
        }

        /* Разметка 12 секторов по 30 градусов */
        .sector:nth-child(1) { transform: rotate(0deg) translate(-100%, -100%); background: #212529; }
        .sector:nth-child(2) { transform: rotate(30deg) translate(-100%, -100%); background: #343a40; }
        .sector:nth-child(3) { transform: rotate(60deg) translate(-100%, -100%); background: #495057; }
        .sector:nth-child(4) { transform: rotate(90deg) translate(-100%, -100%); background: #2a9d8f; border: 1px solid #ffb703; } /* Выигрышный №4 */
        .sector:nth-child(5) { transform: rotate(120deg) translate(-100%, -100%); background: #343a40; }
        .sector:nth-child(6) { transform: rotate(150deg) translate(-100%, -100%); background: #212529; }
        .sector:nth-child(7) { transform: rotate(180deg) translate(-100%, -100%); background: #495057; }
        .sector:nth-child(8) { transform: rotate(210deg) translate(-100%, -100%); background: #6c757d; }
        .sector:nth-child(9) { transform: rotate(240deg) translate(-100%, -100%); background: #212529; }
        .sector:nth-child(10) { transform: rotate(270deg) translate(-100%, -100%); background: #343a40; }
        .sector:nth-child(11) { transform: rotate(300deg) translate(-100%, -100%); background: #495057; }
        .sector:nth-child(12) { transform: rotate(330deg) translate(-100%, -100%); background: #6c757d; }

        .game-controls {
            text-align: center;
        }

        .status-msg {
            margin-top: 15px;
            font-size: 16px;
            font-weight: 500;
            min-height: 24px;
            text-align: center;
        }
        
        .win-text { color: #2a9d8f; font-weight: bold; animation: pulse 0.5s infinite alternate; }
        .lose-text { color: #e63946; }

        @keyframes pulse {
            from { transform: scale(1); }
            to { transform: scale(1.05); }
        }
    </style>
</head>
<body>

    <div class="container">
        <div id="auth-screen">
            <h2>Регистрация счета</h2>
            <form id="reg-form" onsubmit="registerUser(event)">
                <div class="form-group">
                    <label>Ваше Имя</label>
                    <input type="text" id="reg-name" placeholder="Введите имя" required>
                </div>
                <div class="form-group">
                    <label>Электронная почта (Email)</label>
                    <input type="email" id="reg-email" placeholder="example@mail.com" required>
                </div>
                <div class="form-group">
                    <label>Придумайте пароль (код)</label>
                    <input type="password" id="reg-pass" placeholder="••••••••" required>
                </div>
                <button type="submit">Создать аккаунт</button>
            </form>
        </div>

        <div id="game-screen">
            <div class="header-panel">
                <div class="user-info">
                    Игрок: <span class="name" id="user-display-name">User</span>
                </div>
                <div class="balance-box">
                    Баланс: <span class="amount" id="balance-amount">1000</span> Viv
                </div>
            </div>

            <div class="deposit-section">
                <label>Пополнение баланса (Viv)</label>
                <div class="deposit-inputs">
                    <input type="number" id="deposit-amount" placeholder="Сумма" min="10">
                    <button onclick="depositViv()" style="width: auto; padding: 10px 20px; font-size: 14px;">Пополнить</button>
                </div>
            </div>

            <div class="wheel-container">
                <div class="pointer"></div>
                <div class="wheel" id="wheel-element">
                    <div class="sector"><div class="sector-content">🧸<span class="num">1</span></div></div>
                    <div class="sector"><div class="sector-content">🚗<span class="num">2</span></div></div>
                    <div class="sector"><div class="sector-content">🚀<span class="num">3</span></div></div>
                    <div class="sector"><div class="sector-content">👑<span class="num">4</span></div></div>
                    <div class="sector"><div class="sector-content">🤖<span class="num">5</span></div></div>
                    <div class="sector"><div class="sector-content">👾<span class="num">6</span></div></div>
                    <div class="sector"><div class="sector-content">🦄<span class="num">7</span></div></div>
                    <div class="sector"><div class="sector-content">🦁<span class="num">8</span></div></div>
                    <div class="sector"><div class="sector-content">🐼<span class="num">9</span></div></div>
                    <div class="sector"><div class="sector-content">⚽<span class="num">10</span></div></div>
                    <div class="sector"><div class="sector-content">🎸<span class="num">11</span></div></div>
                    <div class="sector"><div class="sector-content">🎨<span class="num">12</span></div></div>
                </div>
            </div>

            <div class="game-controls">
                <div style="margin-bottom: 15px; color: #aaa; font-size: 14px;">
                    Ставка: <strong>100 Viv</strong>. Выигрыш при выпадении кубика №4 (👑 Корона)!
                </div>
                <button id="spin-btn" onclick="spinWheel()">Крутить колесо</button>
                <div class="status-msg" id="status-message"></div>
            </div>
        </div>
    </div>

    <script>
        let currentBalance = 1000;
        let isSpinning = false;

        const authScreen = document.getElementById('auth-screen');
        const gameScreen = document.getElementById('game-screen');
        const userDisplayName = document.getElementById('user-display-name');
        const balanceAmount = document.getElementById('balance-amount');
        const wheelElement = document.getElementById('wheel-element');
        const statusMessage = document.getElementById('status-message');

        function registerUser(event) {
            event.preventDefault();
            const nameInput = document.getElementById('reg-name').value;
            userDisplayName.textContent = nameInput;
            balanceAmount.textContent = currentBalance;
            authScreen.style.display = 'none';
            gameScreen.style.display = 'block';
        }

        function depositViv() {
            const amountInput = document.getElementById('deposit-amount');
            const value = parseInt(amountInput.value);
            if (isNaN(value) || value <= 0) {
                alert('Пожалуйста, введите корректную сумму.');
                return;
            }
            currentBalance += value;
            balanceAmount.textContent = currentBalance;
            amountInput.value = '';
            statusMessage.innerHTML = `<span style="color: #8ecae6;">Баланс пополнен на ${value} Viv!</span>`;
        }

        function spinWheel() {
            if (isSpinning) return;

            const betCost = 100;
            if (currentBalance < betCost) {
                statusMessage.innerHTML = '<span class="lose-text">Недостаточно Viv! Пополните баланс.</span>';
                return;
            }

            currentBalance -= betCost;
            balanceAmount.textContent = currentBalance;
            statusMessage.textContent = 'Колесо вращается...';
            isSpinning = true;

            const targetCube = Math.floor(Math.random() * 12) + 1;
            const sectorDegrees = 30;
            const targetAngle = (12 - (targetCube - 1)) * sectorDegrees + (5 * 360);

            wheelElement.style.transition = 'none';
            wheelElement.style.transform = 'rotate(0deg)';
            
            setTimeout(() => {
                wheelElement.style.transition = 'transform 4s cubic-bezier(0.15, 0.85, 0.35, 1)';
                wheelElement.style.transform = `rotate(${targetAngle}deg)`;
            }, 50);

            setTimeout(() => {
                isSpinning = false;
                if (targetCube === 4) {
                    const winReward = 1000;
                    currentBalance += winReward;
                    balanceAmount.textContent = currentBalance;
                    statusMessage.innerHTML = `<span class="win-text">🎉 Выпал кубик №4! Вы выиграли ${winReward} Viv! 🎉</span>`;
                } else {
                    statusMessage.innerHTML = `<span class="lose-text">Выпал кубик № ${targetCube}. Попробуйте еще раз!</span>`;
                }
            }, 4050);
        }
    </script>
</body>
</html>
